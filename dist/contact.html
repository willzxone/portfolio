<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.gstatic.com">
  <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@100;300;400;500&display=swap"
    rel="stylesheet">
  <script src="https://kit.fontawesome.com/029ad0ef25.js" crossorigin="anonymous"></script>
  <link rel="stylesheet" href="css/main.css">
  <title>About Me</title>
</head>

<body>
  <header id="header-inner">
    <div class="container">
      <nav id="main-nav">
        <img src="./img/logo.png" alt="header image">
        <ul>
          <li><a href="index">Home</a></li>
          <li><a href="about">About</a></li>
          <li><a href="work">Work</a></li>
          <li><a href="contact" class="current">Contact</a></li>
        </ul>
      </nav>
    </div>
  </header>
  <section id="contact" class="text-center py-1 my-1">
    <div class="container">
      <h2 class="section-title">
        Contact Me
      </h2>
      <div class="bottom-line"></div>
      <p class="lead">Here is how you can reach me</p>
      <form name="contact" method="POST" data-netlify="true" data-netlify-recaptcha="true" class="my-1">
        <div class="form">
          <input type="text" name="name" placeholder="Name">
          <input type="email" name="email" placeholder="Email">
          <input type="text" name="address" placeholder="Address">
          <input type="tel" name="phonenumber" placeholder="Phone Number">
          <textarea name="message" placeholder="Enter Your Message" rows="10"></textarea>
        </div>
        <div data-netlify-recaptcha="true"></div>
        <button type="submit" class="btn btn-primary">Submit</button>
      </form>

    </div>
  </section>
  <footer class="py-1">
    <div class="container">
      <div class="footer-content">
        <div>
          <p class="lead">Copyright &copy; 2021. All Rights Reserved</p>
        </div>
        <div>
          <i class="fab fa-twitter"></i>
          <i class="fab fa-facebook"></i>
          <i class="fab fa-youtube"></i>
          <i class="fab fa-instagram"></i>
        </div>
      </div>
    </div>
  </footer>
</body>

</html>
